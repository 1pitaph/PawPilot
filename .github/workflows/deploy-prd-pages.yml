name: Deploy PRD to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - docs/prd-pet-mobility-agent.md
      - docs/prd-pet-mobility-agent.qmd
      - docs/styles.css
      - .github/workflows/deploy-prd-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render PRD
        run: |
          quarto render docs/prd-pet-mobility-agent.qmd
          mkdir -p _site
          cp docs/prd-pet-mobility-agent.html _site/index.html
          cp docs/prd-pet-mobility-agent.html _site/prd-pet-mobility-agent.html
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
